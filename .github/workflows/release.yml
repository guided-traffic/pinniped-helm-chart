name: Release Charts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish Chart
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v4.2.2'

      - name: Verify tag matches chart version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CHART_VERSION=$(awk '/^version:/ {print $2}' charts/pinniped/Chart.yaml)
          if [ "$TAG_VERSION" != "$CHART_VERSION" ]; then
            echo "ERROR: tag ${GITHUB_REF_NAME} does not match Chart.yaml version ${CHART_VERSION}"
            echo "Tags are created by semantic-release after bumping Chart.yaml — do not tag manually."
            exit 1
          fi

      - name: Lint chart
        run: helm lint charts/pinniped

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_existing: true
          # Reuse the semantic-release tag (vX.Y.Z) instead of creating a
          # separate pinniped-X.Y.Z tag for the GitHub release.
          release_name_template: "v{{ .Version }}"
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
