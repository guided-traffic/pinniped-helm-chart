name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  KUBERNETES_VERSION: '1.33.4'
  KIND_CLUSTER_NAME: pinniped-e2e

jobs:
  lint:
    name: Chart Linting
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v4.2.2'

      - name: Run helm lint
        run: helm lint charts/pinniped

      - name: Render default values
        run: helm template pinniped charts/pinniped --namespace pinniped > /tmp/render-default.yaml

      - name: Render with stackitSKE.enabled=true
        run: |
          helm template pinniped charts/pinniped --namespace pinniped \
            --set stackitSKE.enabled=true > /tmp/render-ske.yaml

      - name: Assert SKE flag semantics
        run: |
          set -euo pipefail
          # Upstream behavior: both groups bound
          grep -q 'system:authenticated' /tmp/render-default.yaml
          grep -q 'system:unauthenticated' /tmp/render-default.yaml
          # SKE mode: system:authenticated must be gone, anonymous path stays
          if grep -q 'system:authenticated' /tmp/render-ske.yaml; then
            echo "ERROR: SKE render still binds system:authenticated"
            exit 1
          fi
          grep -q 'system:unauthenticated' /tmp/render-ske.yaml
          echo "SKE flag semantics OK"

      - name: Render with custom namespace
        run: |
          set -euo pipefail
          helm template pinniped charts/pinniped --namespace default \
            --set namespace=iam > /tmp/render-ns.yaml
          grep -q 'namespace: iam' /tmp/render-ns.yaml
          # kube-system RBAC must stay in kube-system
          grep -q 'namespace: kube-system' /tmp/render-ns.yaml
          echo "Namespace override OK"

  e2e:
    name: E2E Test (Kind)
    runs-on: self-hosted
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: guidedtraffic
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Create Kind config for DinD
        run: |
          cat << EOF > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          name: ${KIND_CLUSTER_NAME}
          nodes:
          - role: control-plane
          # Use native snapshotter to avoid nested overlay issues in DinD
          containerdConfigPatches:
          - |-
            [plugins."io.containerd.grpc.v1.cri".containerd]
              snapshotter = "native"
              disable_snapshot_annotations = false
          EOF

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v${{ env.KUBERNETES_VERSION }}'

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v4.2.2'

      - name: Create Kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.30.0
          node_image: kindest/node:v${{ env.KUBERNETES_VERSION }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s
          ignore_failed_clean: true
          config: kind-config.yaml

      - name: Verify Kind cluster
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl wait --for=condition=Ready nodes --all --timeout=180s
          kubectl get nodes

      - name: Fix inotify limits inside Kind node
        run: |
          # Since Linux 5.13, inotify limits are user-namespace-aware.
          # Host sysctl settings are NOT inherited by containers.
          # kube-proxy crashes with "too many open files" without this.
          docker exec ${KIND_CLUSTER_NAME}-control-plane sysctl -w fs.inotify.max_user_watches=1048576
          docker exec ${KIND_CLUSTER_NAME}-control-plane sysctl -w fs.inotify.max_user_instances=8192

      - name: Wait for kube-system pods
        run: |
          set -euo pipefail
          echo "=== kube-system pod status before wait ==="
          kubectl -n kube-system get pods -o wide
          echo ""

          # ---------- helper: resilient daemonset wait ----------
          # kube-proxy can crash on DinD runners when iptables kernel modules
          # are slow to initialise. Detect broken pods, collect logs, delete
          # them so the DaemonSet controller recreates them, and retry.
          wait_daemonset() {
            local ds_name="$1" label="$2" max_attempts=5
            for attempt in $(seq 1 $max_attempts); do
              echo "[${ds_name}] attempt ${attempt}/${max_attempts}"
              if kubectl -n kube-system rollout status daemonset/"${ds_name}" --timeout=60s 2>/dev/null; then
                echo "[${ds_name}] ready."
                return 0
              fi
              bad_pods=$(kubectl -n kube-system get pods -l "${label}" --no-headers 2>/dev/null \
                         | grep -E 'Error|CrashLoopBackOff|Init:Error' | awk '{print $1}') || true
              if [ -n "$bad_pods" ]; then
                for pod in $bad_pods; do
                  echo "[${ds_name}] logs from ${pod}:"
                  kubectl -n kube-system logs "$pod" --tail=30 2>&1 || true
                  echo "[${ds_name}] deleting ${pod} to trigger recreation..."
                  kubectl -n kube-system delete pod "$pod" --force --grace-period=0 2>/dev/null || true
                done
                sleep 10
              else
                echo "[${ds_name}] no error pods found, pods may still be starting..."
                sleep 15
              fi
            done
            echo "ERROR: daemonset ${ds_name} not ready after ${max_attempts} attempts"
            kubectl -n kube-system describe daemonset/"${ds_name}" || true
            kubectl -n kube-system describe pods -l "${label}" || true
            return 1
          }

          wait_daemonset "kube-proxy" "k8s-app=kube-proxy"
          wait_daemonset "kindnet"    "app=kindnet"

          echo "Waiting for coredns..."
          kubectl -n kube-system rollout status deployment/coredns --timeout=120s

          echo ""
          echo "=== Final pod status ==="
          kubectl -n kube-system get pods -o wide

      - name: Verify in-cluster API connectivity
        run: |
          # kube-proxy pods being Ready does NOT mean their iptables DNAT rules
          # for ClusterIPs are applied yet. In DinD this race causes i/o timeouts
          # inside pods — fatal for Pinniped's aggregated API servers. Probe from
          # inside the cluster; on failure restart kube-proxy and retry.
          set -euo pipefail
          PROBE_OK=false
          for attempt in 1 2 3; do
            kubectl run api-probe -n default \
              --image=busybox:1.36 \
              --restart=Never \
              -- sleep 60
            kubectl wait -n default --for=condition=Ready pod/api-probe --timeout=60s

            if kubectl exec -n default api-probe -- \
                timeout 20 sh -c \
                'until nc -z -w 2 kubernetes.default.svc 443 2>/dev/null; do sleep 2; done'; then
              echo "In-cluster API connectivity OK (attempt ${attempt})"
              PROBE_OK=true
              kubectl delete -n default pod api-probe --force --grace-period=0
              break
            fi

            echo "Connectivity check failed on attempt ${attempt} — restarting kube-proxy..."
            kubectl delete -n default pod api-probe --force --grace-period=0 || true
            kubectl -n kube-system rollout restart daemonset/kube-proxy
            kubectl -n kube-system rollout status daemonset/kube-proxy --timeout=60s
          done

          if [ "$PROBE_OK" = "false" ]; then
            echo "ERROR: In-cluster API connectivity could not be established"
            exit 1
          fi

      - name: Install chart
        id: helm-install
        continue-on-error: true
        run: |
          helm install pinniped charts/pinniped \
            --namespace pinniped \
            --create-namespace \
            --wait \
            --timeout 300s \
            --debug

      - name: Debug Helm install failure
        if: steps.helm-install.outcome == 'failure'
        run: |
          echo "=== Helm install failed, collecting diagnostics ==="
          kubectl -n pinniped get pods -o wide || true
          kubectl -n pinniped describe pods || true
          kubectl -n pinniped get events --sort-by='.lastTimestamp' || true
          kubectl -n pinniped logs -l app=pinniped-supervisor --tail=100 || true
          kubectl -n pinniped logs -l app=pinniped-concierge --tail=100 || true
          exit 1

      - name: Wait for aggregated APIs
        run: |
          set -euo pipefail
          for api in \
            v1alpha1.login.concierge.pinniped.dev \
            v1alpha1.identity.concierge.pinniped.dev \
            v1alpha1.clientsecret.supervisor.pinniped.dev; do
            echo "Waiting for APIService ${api}..."
            kubectl wait --for=condition=Available "apiservice/${api}" --timeout=180s
          done
          echo "All aggregated APIs available."

      - name: Wait for cluster signing certificate strategy
        run: |
          # On Kind the control plane is visible, so the kube-cert-agent must
          # be able to fetch the cluster signing key (unlike on managed
          # clusters). This exercises the whole cert-agent machinery.
          set -euo pipefail
          for i in $(seq 1 36); do
            STATUS=$(kubectl get credentialissuer pinniped-concierge-config \
              -o jsonpath='{.status.strategies[?(@.type=="KubeClusterSigningCertificate")].status}' 2>/dev/null || echo "")
            if [ "$STATUS" = "Success" ]; then
              echo "KubeClusterSigningCertificate strategy: Success"
              exit 0
            fi
            echo "attempt ${i}/36: strategy status '${STATUS}', retrying..."
            sleep 5
          done
          echo "ERROR: KubeClusterSigningCertificate strategy never became Success"
          kubectl get credentialissuer pinniped-concierge-config -o yaml || true
          kubectl -n pinniped get pods -o wide || true
          kubectl -n pinniped logs -l app=pinniped-concierge --tail=100 || true
          exit 1

      - name: Smoke test WhoAmIRequest via aggregation layer
        run: |
          set -euo pipefail
          USERNAME=""
          for i in $(seq 1 12); do
            USERNAME=$(kubectl create -o jsonpath='{.status.kubernetesUserInfo.user.username}' -f - <<'EOF' || echo ""
          apiVersion: identity.concierge.pinniped.dev/v1alpha1
          kind: WhoAmIRequest
          EOF
          )
            if [ -n "$USERNAME" ]; then
              break
            fi
            echo "attempt ${i}/12: no username in response, full response was:"
            kubectl create -o yaml -f - <<'EOF' || true
          apiVersion: identity.concierge.pinniped.dev/v1alpha1
          kind: WhoAmIRequest
          EOF
            sleep 5
          done
          echo "WhoAmIRequest answered, username: ${USERNAME}"
          test -n "$USERNAME"

      - name: Install pinniped CLI
        run: |
          set -euo pipefail
          VERSION=$(awk '/^appVersion:/{gsub(/"/,"",$2); print $2}' charts/pinniped/Chart.yaml)
          case "$(uname -m)" in
            x86_64) ARCH=amd64 ;;
            aarch64|arm64) ARCH=arm64 ;;
            *) echo "unsupported arch $(uname -m)"; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/pinniped" \
            "https://github.com/vmware-tanzu/pinniped/releases/download/${VERSION}/pinniped-cli-linux-${ARCH}"
          chmod +x "$HOME/.local/bin/pinniped"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/pinniped" version

      - name: Deploy mock IdP (Dex) and wire up Pinniped
        run: ./test/e2e/setup-idp.sh

      - name: E2E login with synthetic credentials
        run: ./test/e2e/auth-test.sh

      - name: Verify stackitSKE flag on the cluster
        run: |
          set -euo pipefail
          helm upgrade pinniped charts/pinniped \
            --namespace pinniped \
            --reuse-values \
            --set stackitSKE.enabled=true \
            --wait \
            --timeout 120s
          SUBJECTS=$(kubectl get clusterrolebinding pinniped-concierge-pre-authn-apis \
            -o jsonpath='{range .subjects[*]}{.name}{"\n"}{end}')
          echo "pre-authn-apis subjects after SKE upgrade:"
          echo "${SUBJECTS}"
          if [ "${SUBJECTS}" != "system:unauthenticated" ]; then
            echo "ERROR: expected only system:unauthenticated"
            exit 1
          fi
          echo "SKE flag verified on cluster."

      - name: E2E login still works in SKE mode
        run: ./test/e2e/auth-test.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Supervisor logs ==="
          kubectl -n pinniped logs -l app=pinniped-supervisor --tail=100 || true
          echo "=== Concierge logs ==="
          kubectl -n pinniped logs -l app=pinniped-concierge --tail=100 || true
          echo "=== Describe pods ==="
          kubectl -n pinniped describe pods || true
          echo "=== Events ==="
          kubectl -n pinniped get events --sort-by='.lastTimestamp' || true
          echo "=== APIServices ==="
          kubectl get apiservices | grep pinniped || true
          echo "=== Dex logs ==="
          kubectl -n dex logs -l app=dex --tail=100 || true
          echo "=== Pinniped custom resources ==="
          kubectl -n pinniped get oidcidentityprovider,federationdomain -o yaml || true
          kubectl get jwtauthenticator -o yaml || true

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name ${KIND_CLUSTER_NAME} || true

  semantic-release:
    name: Semantic Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, e2e]
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        run: npx semantic-release
