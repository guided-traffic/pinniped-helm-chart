{{- if and .Values.supervisor.enabled .Values.supervisor.ingress.enabled }}
{{- $ing := .Values.supervisor.ingress }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pinniped-supervisor
  namespace: {{ include "pinniped.supervisor.namespace" . }}
  labels:
    {{- include "pinniped.supervisor.labels" . | nindent 4 }}
  {{- with $ing.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $ing.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $ing.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- range $ing.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType | default "Prefix" }}
        backend:
          service:
            name: pinniped-supervisor
            port:
              number: {{ $.Values.supervisor.service.port }}
      {{- end }}
  {{- end }}
{{- end }}
