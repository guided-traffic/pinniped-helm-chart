{{- if .Values.supervisor.enabled }}
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.clientsecret.supervisor.pinniped.dev
  labels:
    {{- include "pinniped.supervisor.labels" . | nindent 4 }}
spec:
  version: v1alpha1
  group: clientsecret.supervisor.pinniped.dev
  groupPriorityMinimum: 9900
  versionPriority: 15
  service:
    name: pinniped-supervisor-api
    namespace: {{ include "pinniped.supervisor.namespace" . }}
    port: 443
{{- end }}
