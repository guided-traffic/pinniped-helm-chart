{{- if .Values.concierge.enabled }}
{{- $ns := include "pinniped.concierge.namespace" . }}
apiVersion: v1
kind: Service
metadata:
  name: pinniped-concierge-api
  namespace: {{ $ns }}
  labels:
    {{- include "pinniped.concierge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    deployment.pinniped.dev: concierge
  ports:
  - protocol: TCP
    port: 443
    targetPort: 10250
---
apiVersion: v1
kind: Service
metadata:
  name: pinniped-concierge-proxy
  namespace: {{ $ns }}
  labels:
    {{- include "pinniped.concierge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    deployment.pinniped.dev: concierge
  ports:
  - protocol: TCP
    port: 443
    targetPort: 8444
{{- end }}
